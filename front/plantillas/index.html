<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club de Voleibol - Login</title>
    <link rel="stylesheet" href="../static/Css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-container">
                    <i class="fas fa-volleyball-ball logo-icon"></i>
                    <h1>Club Voleibol</h1>
                    <p class="subtitle">Panel de Administración</p>
                </div>
            </div>
            
            <form id="loginForm" class="login-form">
                <div id="messageContainer" style="display: none; padding: 10px; margin-bottom: 15px; border-radius: 4px; text-align: center;"></div>
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Ingrese su usuario" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Ingrese su contraseña" required>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="remember">
                        <span class="checkmark"></span>
                        Recordarme
                    </label>
                    <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Iniciar Sesión
                </button>
                
                <div class="login-footer">
                    <p>© 2023 Club de Voleibol. Todos los derechos reservados.</p>
                </div>
            </form>
            
        </div>
        
        <div class="login-side">
            <div class="side-content">
                <h2>Bienvenido al Sistema de Administración</h2>
                <p>Gestiona tu club de voleibol de manera eficiente</p>
                <div class="features">
                    <div class="feature">
                        <i class="fas fa-dollar-sign"></i>
                        <span>Gestión de pagos</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Calendarios</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-users"></i>
                        <span>Atletas y entrenadores</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-clipboard-check"></i>
                        <span>Control de asistencias</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../static/JS/auth.js"></script>
</body>
</html>
